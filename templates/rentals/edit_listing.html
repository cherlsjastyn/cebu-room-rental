{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h2 class="fw-bold mb-0">
                        <i class="fas fa-edit text-teal me-2"></i> Edit Listing
                    </h2>
                    <p class="text-muted mt-2">Update your property details</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'my_listings' %}" class="btn btn-outline-secondary rounded-pill px-4">
                                <i class="fas fa-arrow-left me-2"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-teal rounded-pill px-4">
                                <i class="fas fa-save me-2"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .text-teal { color: #0f766e; }
    .btn-teal {
        background: #0f766e;
        color: white;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-teal:hover {
        background: #0d9488;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
