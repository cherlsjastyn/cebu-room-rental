{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 pt-4 px-4 text-center">
                    <i class="fas fa-sign-in-alt fa-3x text-teal mb-3"></i>
                    <h2 class="fw-bold mb-0">Welcome Back</h2>
                    <p class="text-muted mt-2">Login to your account</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control rounded-pill" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control rounded-pill" required>
                        </div>
                        <button type="submit" class="btn btn-teal w-100 py-2 rounded-pill">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted">
                            Don't have an account? 
                            <a href="{% url 'register' %}" class="text-teal text-decoration-none fw-semibold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    .text-teal { color: #0f766e; }
    .btn-teal {
        background: #0f766e;
        color: white;
        border: none;
        transition: all 0.3s ease;
        padding: 12px;
        font-weight: 600;
    }
    .btn-teal:hover {
        background: #0d9488;
        transform: translateY(-2px);
    }
    .form-control:focus {
        border-color: #0f766e;
        box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.1);
    }
</style>
{% endblock %}
