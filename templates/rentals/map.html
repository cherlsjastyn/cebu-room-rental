{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-0">
    <div class="bg-teal-gradient py-4 text-white text-center">
        <h1 class="fw-bold mb-0 fs-2">
            <i class="fas fa-map-marked-alt me-2"></i> Find Properties on the Map
        </h1>
        <p class="mt-2 mb-0 px-3">Browse available rooms and apartments in Cebu City and Lapu-Lapu City</p>
    </div>
    
    <div id="map" style="height: 65vh; min-height: 450px; width: 100%;"></div>
</div>

<!-- Leaflet CSS and JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Cebu City center coordinates
    var cebuCenter = [10.3157, 123.8854];
    
    // Initialize map centered on Cebu
    var map = L.map('map').setView(cebuCenter, 12);
    
    // Add tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);
    
    // Custom marker icon
    var customIcon = L.divIcon({
        html: '<div style="background-color: #0f766e; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"><i class="fas fa-home" style="color: white; font-size: 14px;"></i></div>',
        iconSize: [30, 30],
        popupAnchor: [0, -15]
    });
    
    // Generate random offset for marker positions
    function getRandomOffset() {
        return (Math.random() - 0.5) * 0.02;
    }
    
    // Fetch listings from API
    fetch('/api/listings/')
        .then(function(response) {
            return response.json();
        })
        .then(function(listings) {
            listings.forEach(function(listing) {
                // Create a random position for each listing around Cebu City
                var lat = cebuCenter[0] + getRandomOffset();
                var lng = cebuCenter[1] + getRandomOffset();
                
                var marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                
                // Format price
                var priceText = '';
                if (listing.daily_price && listing.monthly_price) {
                    priceText = '₱' + listing.daily_price + '/day or ₱' + listing.monthly_price + '/month';
                } else if (listing.daily_price) {
                    priceText = '₱' + listing.daily_price + '/day';
                } else if (listing.monthly_price) {
                    priceText = '₱' + listing.monthly_price + '/month';
                } else {
                    priceText = 'Price not set';
                }
                
                var popupContent = '<div style="min-width: 200px; max-width: 260px;">' +
                    '<h6 style="font-weight: bold; margin-bottom: 8px; font-size: 15px;">' + listing.title + '</h6>' +
                    '<p style="margin-bottom: 5px; font-size: 13px;"><i class="fas fa-tag"></i> ' + priceText + '</p>' +
                    '<p style="margin-bottom: 5px; font-size: 13px;"><i class="fas fa-building"></i> ' + listing.property_type + '</p>' +
                    '<p style="margin-bottom: 8px; font-size: 13px;"><i class="fas fa-map-marker-alt"></i> ' + listing.location + '</p>' +
                    '<a href="/listing/' + listing.id + '/" class="btn btn-teal btn-sm mt-2" style="background: #0f766e; color: white; text-decoration: none; padding: 6px 12px; border-radius: 20px; display: inline-block; font-size: 12px;">View Details</a>' +
                    '</div>';
                
                marker.bindPopup(popupContent);
            });
        })
        .catch(function(error) {
            console.error('Error loading listings:', error);
        });
</script>

<style>
    .bg-teal-gradient {
        background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
    }
    .btn-teal {
        background: #0f766e;
        color: white;
    }
    .btn-teal:hover {
        background: #0d9488;
    }
    .leaflet-popup-content-wrapper {
        border-radius: 12px;
    }
    
    @media (max-width: 576px) {
        #map {
            height: 55vh;
            min-height: 350px;
        }
        .bg-teal-gradient h1 {
            font-size: 1.4rem;
        }
        .bg-teal-gradient p {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}
